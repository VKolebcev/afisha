<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Афиша</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@100;200;300;400;500;600;700;800;900&family=Barlow:wght@100;200;300;400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & ROOT ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --bg:      #000000;
  --fg:      #ffffff;
  --mid:     #888888;
  --dim:     #444444;
  --card-bg: #0d0d0d;
  --line:    rgba(255,255,255,.1);
  --line-h:  rgba(255,255,255,.3);
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'Barlow', sans-serif;
  font-weight: 200;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  cursor: default;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 200;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 1.5rem;
  height: 48px;
}

.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--fg);
  cursor: pointer;
  text-decoration: none;
}

.header-center {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 100;
  font-size: .6rem;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--dim);
  white-space: nowrap;
}

.header-right {
  display: flex; align-items: center; gap: .8rem;
  justify-content: flex-end;
}

.last-updated {
  font-family: 'DM Mono', monospace;
  font-size: .58rem;
  color: var(--dim);
  white-space: nowrap;
}

.refresh-btn {
  background: none;
  border: 1px solid var(--line);
  color: var(--dim);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem;
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
.refresh-btn:hover { border-color: var(--fg); color: var(--fg); }
.refresh-btn.spinning { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── HERO ── */
.hero {
  padding: 4rem 1.5rem 3rem;
  border-bottom: 1px solid var(--line);
  position: relative;
  overflow: hidden;
}

.hero-num {
  position: absolute;
  right: 1.5rem; top: 3.2rem;
  font-family: 'DM Mono', monospace;
  font-size: clamp(5rem, 15vw, 12rem);
  font-weight: 300;
  color: rgba(255,255,255,.04);
  line-height: 1;
  user-select: none;
  pointer-events: none;
}

.hero-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 100;
  font-size: .65rem;
  letter-spacing: .5em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 1.2rem;
}

.hero h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: clamp(3.8rem, 12vw, 9rem);
  line-height: .92;
  letter-spacing: -.01em;
  text-transform: uppercase;
  color: var(--fg);
}

.hero h1 .thin {
  font-weight: 100;
  color: var(--mid);
}

.hero-rule {
  width: 48px; height: 1px;
  background: var(--fg);
  margin: 2rem 0 1.2rem;
}

.hero-sub {
  font-family: 'Barlow', sans-serif;
  font-weight: 100;
  font-size: .8rem;
  letter-spacing: .12em;
  color: var(--mid);
  text-transform: uppercase;
}

/* ── FILTER ── */
.filter-bar {
  display: flex; align-items: center; gap: 0;
  padding: 0 1.5rem;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }

.filter-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--dim);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 300;
  font-size: .75rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  padding: .85rem 1.2rem .75rem;
  cursor: pointer;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.filter-btn:hover { color: var(--fg); }
.filter-btn.active { color: var(--fg); border-bottom-color: var(--fg); }

/* ── COUNT BAR ── */
.count-bar {
  padding: .55rem 1.5rem;
  border-bottom: 1px solid var(--line);
  font-family: 'DM Mono', monospace;
  font-size: .6rem;
  color: var(--dim);
  letter-spacing: .06em;
}

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 1.5rem 5rem;
  gap: 0;
}

@media (min-width: 640px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }

/* ── CARD ── */
.card {
  border: 1px solid var(--line);
  margin: -1px 0 0 -1px; /* collapse borders */
  background: var(--bg);
  overflow: hidden;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  position: relative;
  transition: background .18s, border-color .18s;
  animation: fadeIn .4s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.card:nth-child(1)  { animation-delay: .03s; }
.card:nth-child(2)  { animation-delay: .06s; }
.card:nth-child(3)  { animation-delay: .09s; }
.card:nth-child(4)  { animation-delay: .12s; }
.card:nth-child(5)  { animation-delay: .15s; }
.card:nth-child(6)  { animation-delay: .18s; }
.card:nth-child(7)  { animation-delay: .21s; }
.card:nth-child(8)  { animation-delay: .24s; }
.card:nth-child(9)  { animation-delay: .27s; }
.card:nth-child(10) { animation-delay: .30s; }

/* INVERSION on hover — the key effect */
.card:hover {
  background: var(--fg);
  border-color: var(--fg);
  z-index: 2;
}
.card:hover .card-theater  { color: #555; }
.card:hover .card-title    { color: var(--bg); }
.card:hover .card-body     { border-top-color: rgba(0,0,0,.15); }
.card:hover .date-num      { color: var(--bg); }
.card:hover .date-info     { color: #555; }
.card:hover .date-time     { color: #888; }
.card:hover .dates-lbl     { color: #888; }
.card:hover .more-dates    { color: #888; }
.card:hover .card-footer   { border-top-color: rgba(0,0,0,.12); }
.card:hover .price         { color: var(--bg); }
.card:hover .price-lbl     { color: #999; }
.card:hover .avail-yes     { background: rgba(0,160,80,.12); color: #007a3a; border-color: rgba(0,160,80,.3); }
.card:hover .avail-no      { background: rgba(180,0,40,.1);  color: #aa0020; border-color: rgba(180,0,40,.25); }
.card:hover .avail-unk     { background: rgba(0,0,0,.06);    color: #888;    border-color: rgba(0,0,0,.15); }
.card:hover .btn-buy       { background: var(--bg); color: var(--fg); border-color: var(--bg); }
.card:hover .btn-more      { color: var(--bg); border-color: rgba(0,0,0,.25); }

/* Poster */
.card-poster {
  aspect-ratio: 16/9;
  overflow: hidden;
  background: #0d0d0d;
  flex-shrink: 0;
  position: relative;
}
.card:hover .card-poster { background: #ddd; }

.card-poster img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  filter: grayscale(30%);
  transition: filter .3s, transform .35s ease;
}
.card:hover .card-poster img {
  filter: grayscale(0%);
  transform: scale(1.04);
}

.poster-ph {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1.1rem;
  letter-spacing: .3em;
  color: rgba(255,255,255,.08);
  text-transform: uppercase;
}
.card:hover .poster-ph { color: rgba(0,0,0,.12); }

/* Body */
.card-body {
  padding: 1rem 1rem .85rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: .5rem;
  border-top: 1px solid var(--line);
}

.card-theater {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 200;
  font-size: .62rem;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 1.35rem;
  line-height: 1.1;
  letter-spacing: .01em;
  text-transform: uppercase;
  color: var(--fg);
}

/* Availability badge */
.avail-badge {
  display: inline-flex; align-items: center; gap: .3rem;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 400;
  font-size: .62rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  padding: .18rem .5rem;
  border: 1px solid;
  width: fit-content;
}
.avail-yes { background: rgba(0,200,100,.08); color: #00c864; border-color: rgba(0,200,100,.25); }
.avail-no  { background: rgba(255,40,70,.08);  color: #ff4060; border-color: rgba(255,40,70,.2); }
.avail-unk { background: transparent; color: var(--dim); border-color: var(--line); }
.avail-dot { width: 5px; height: 5px; background: currentColor; flex-shrink: 0; }

/* Dates */
.card-dates {
  flex: 1;
  display: flex; flex-direction: column; gap: .18rem;
}

.dates-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 200;
  font-size: .58rem;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: .2rem;
}

.date-row {
  display: flex; align-items: baseline; gap: .5rem;
}

.date-num {
  font-family: 'DM Mono', monospace;
  font-weight: 400;
  font-size: 1.05rem;
  color: var(--fg);
  min-width: 1.5rem;
  line-height: 1;
}

.date-info {
  font-family: 'Barlow', sans-serif;
  font-weight: 200;
  font-size: .8rem;
  color: var(--mid);
  flex: 1;
}

.date-rel {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: .6rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--fg);
}
.card:hover .date-rel { color: var(--bg); }

.date-time {
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  color: var(--dim);
  flex-shrink: 0;
}

.date-sold { opacity: .3; text-decoration: line-through; }
.more-dates {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 200;
  font-size: .65rem;
  letter-spacing: .1em;
  color: var(--dim);
  text-transform: uppercase;
}

/* Footer */
.card-footer {
  display: flex; align-items: center; justify-content: space-between; gap: .4rem;
  padding-top: .8rem;
  margin-top: .15rem;
  border-top: 1px solid var(--line);
}

.price {
  font-family: 'DM Mono', monospace;
  font-weight: 400;
  font-size: .9rem;
  color: var(--fg);
}
.price-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 200;
  font-size: .55rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--dim);
}

.btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 500;
  font-size: .65rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  text-decoration: none;
  padding: .38rem .75rem;
  border: 1px solid;
  cursor: pointer;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: .3rem;
  transition: background .15s, color .15s, border-color .15s;
}
.btn-buy  { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.btn-buy:hover  { background: var(--bg); color: var(--fg); }
.btn-more { background: none; color: var(--mid); border-color: var(--line); }
.btn-more:hover { color: var(--fg); border-color: var(--mid); }

/* ── MODAL ── */
.backdrop {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,.82);
  backdrop-filter: blur(6px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.backdrop.open { opacity: 1; pointer-events: all; }
@media (min-width: 600px) { .backdrop { align-items: center; } }

.modal {
  background: var(--bg);
  border: 1px solid var(--line-h);
  border-bottom: none;
  width: 100%; max-width: 600px; max-height: 92vh;
  overflow-y: auto;
  transform: translateY(24px);
  transition: transform .28s cubic-bezier(.2,.8,.3,1);
  position: relative;
}
@media (min-width: 600px) {
  .modal { border: 1px solid var(--line-h); max-height: 88vh; }
}
.backdrop.open .modal { transform: translateY(0); }

.modal-drag {
  width: 32px; height: 3px;
  background: var(--line-h);
  margin: .8rem auto .4rem;
}
@media (min-width: 600px) { .modal-drag { display: none; } }

.modal-header {
  padding: 1.4rem 1.5rem 1.2rem;
  border-bottom: 1px solid var(--line);
  position: relative;
}

.modal-close {
  position: absolute; top: 1.1rem; right: 1.1rem;
  background: none;
  border: 1px solid var(--line);
  color: var(--dim);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem;
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
.modal-close:hover { border-color: var(--fg); color: var(--fg); }

.m-theater {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 200;
  font-size: .62rem;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: .5rem;
}

.m-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: clamp(1.8rem, 6vw, 2.8rem);
  line-height: .95;
  text-transform: uppercase;
  color: var(--fg);
  margin-bottom: .8rem;
  padding-right: 2.5rem;
}

.m-desc {
  font-family: 'Barlow', sans-serif;
  font-weight: 200;
  font-size: .82rem;
  line-height: 1.7;
  color: var(--mid);
  padding: 1.2rem 1.5rem;
  border-bottom: 1px solid var(--line);
}

.m-section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 200;
  font-size: .6rem;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--dim);
  padding: .8rem 1.5rem .3rem;
}

.m-dates { padding: 0 1.5rem .5rem; }

.m-date {
  display: grid;
  grid-template-columns: 2.8rem 1fr auto auto;
  align-items: center;
  gap: .5rem;
  padding: .65rem 0;
  border-bottom: 1px solid var(--line);
  transition: background .12s;
}
.m-date:last-child { border-bottom: none; }
.m-date:hover { background: rgba(255,255,255,.03); margin: 0 -1.5rem; padding: .65rem 1.5rem; }
.m-date.sold { opacity: .25; text-decoration: line-through; }

.m-date-num {
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  font-size: 1.4rem;
  color: var(--fg);
  line-height: 1;
}

.m-date-info { min-width: 0; }
.m-date-main {
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  font-size: .85rem;
  color: var(--fg);
}
.m-date-sub {
  font-family: 'DM Mono', monospace;
  font-size: .6rem;
  color: var(--dim);
}

.m-date-price {
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  color: var(--mid);
  text-align: right;
  flex-shrink: 0;
}
.m-date-price small {
  display: block;
  font-size: .52rem;
  color: var(--dim);
}

.m-buy-btn {
  width: 28px; height: 28px;
  border: 1px solid var(--line-h);
  background: none;
  color: var(--fg);
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; font-size: .75rem;
  transition: background .15s, color .15s;
  flex-shrink: 0;
}
.m-buy-btn:hover { background: var(--fg); color: var(--bg); }

.m-footer {
  padding: 1rem 1.5rem 1.5rem;
  display: flex; justify-content: flex-end;
  border-top: 1px solid var(--line);
  gap: .6rem;
}

.no-dates {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 200;
  font-size: .75rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--dim);
  padding: 1.5rem 0;
  text-align: center;
}

/* ── STATES ── */
.state-box {
  grid-column: 1 / -1;
  display: flex; flex-direction: column; align-items: center;
  padding: 6rem 1rem; gap: 1.2rem; text-align: center;
}

.state-cross {
  width: 40px; height: 40px; position: relative; opacity: .2;
}
.state-cross::before, .state-cross::after {
  content: ''; position: absolute;
  background: var(--fg);
}
.state-cross::before { width: 1px; height: 40px; top: 0; left: 50%; }
.state-cross::after  { width: 40px; height: 1px; top: 50%; left: 0; }

.state-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 300;
  font-size: 1rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--mid);
}
.state-sub {
  font-family: 'Barlow', sans-serif;
  font-weight: 200;
  font-size: .78rem;
  color: var(--dim);
  max-width: 320px;
}

.spinner {
  width: 28px; height: 28px;
  border: 1px solid var(--line-h);
  border-top-color: var(--fg);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--dim); }

/* ── SELECTION ── */
::selection { background: var(--fg); color: var(--bg); }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="closeModal()">АФИША</div>
  <div class="header-center">Мониторинг билетов</div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="refresh-btn" id="refreshBtn" title="Обновить" onclick="loadData(true)">↻</button>
  </div>
</header>

<section class="hero">
  <div class="hero-num" id="heroNum">00</div>
  <p class="hero-eyebrow">Москва · Ваша подборка</p>
  <h1>
    ТЕАТ<span class="thin">РАЛЬ</span><br>
    НАЯ<br>
    <span class="thin">АФИ</span>ША
  </h1>
  <div class="hero-rule"></div>
  <p class="hero-sub">Ближайшие даты · Наличие билетов</p>
</section>

<div class="filter-bar" id="filterBar" style="display:none">
  <button class="filter-btn active" onclick="setFilter('all',this)">Все</button>
  <button class="filter-btn"        onclick="setFilter('avail',this)">Есть билеты</button>
  <button class="filter-btn"        onclick="setFilter('soon',this)">14 дней</button>
</div>

<div class="count-bar" id="countBar" style="display:none"></div>

<div class="grid" id="grid">
  <div class="state-box">
    <div class="spinner"></div>
    <p class="state-title">Загрузка</p>
  </div>
</div>

<!-- MODAL -->
<div class="backdrop" id="backdrop" onclick="backdropClick(event)">
  <div class="modal">
    <div class="modal-drag"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <p class="m-theater" id="mTheater"></p>
      <h2 class="m-title"  id="mTitle"></h2>
      <div id="mBadge"></div>
    </div>
    <p class="m-desc" id="mDesc" style="display:none"></p>
    <p class="m-section-label">Расписание</p>
    <div class="m-dates" id="mDates"></div>
    <div class="m-footer">
      <a id="mLink" href="#" target="_blank" class="btn btn-more">Страница ↗</a>
    </div>
  </div>
</div>

<script>
const DATA_URL = 'data/productions.json';
let all = [];
let filter = 'all';

const MONS  = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
const MONS_F= ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const WDS   = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

function pd(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function today0() { const t=new Date(); t.setHours(0,0,0,0); return t; }
function fmtShort(s) { const d=pd(s); return `${d.getDate()} ${MONS[d.getMonth()]}`; }
function fmtFull(s)  { const d=pd(s); return `${d.getDate()} ${MONS_F[d.getMonth()]} ${d.getFullYear()}`; }
function wday(s)     { return WDS[pd(s).getDay()]; }
function daysDiff(s) { return Math.round((pd(s)-today0())/86400000); }

function fmtPrice(mn,mx) {
  if (!mn&&!mx) return '';
  const f = n => n.toLocaleString('ru');
  return (mn===mx||!mx) ? `${f(mn)} ₽` : `${f(mn)} – ${f(mx)} ₽`;
}

function relLabel(s) {
  const d=daysDiff(s);
  if(d===0) return 'СЕГОДНЯ';
  if(d===1) return 'ЗАВТРА';
  if(d<=7)  return `${d} ДН.`;
  return null;
}

function pluralDates(n) {
  if(n%10===1&&n%100!==11) return 'дата';
  if([2,3,4].includes(n%10)&&![12,13,14].includes(n%100)) return 'даты';
  return 'дат';
}

/* ── FILTER ── */
function setFilter(f,btn) {
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function filtered() {
  const t=today0();
  const t14=new Date(t); t14.setDate(t.getDate()+14);
  return all.filter(p=>{
    if(filter==='avail') return p.available;
    if(filter==='soon')  return p.dates.some(d=>{ const dt=pd(d.date); return dt>=t&&dt<=t14; });
    return true;
  });
}

/* ── LOAD ── */
async function loadData(force=false) {
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    const r=await fetch(force?`${DATA_URL}?t=${Date.now()}`:DATA_URL);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    all=data.productions||[];

    // Update hero counter
    document.getElementById('heroNum').textContent =
      String(all.length).padStart(2,'0');

    if(data.last_updated) {
      const dt=new Date(data.last_updated);
      document.getElementById('lastUpdated').textContent=
        `${dt.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'})} ${dt.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}`;
    }
    document.getElementById('filterBar').style.display='flex';
    document.getElementById('countBar').style.display='block';
    renderGrid();
  } catch(e) {
    document.getElementById('grid').innerHTML=`
      <div class="state-box">
        <div class="state-cross"></div>
        <p class="state-title">Ошибка загрузки</p>
        <p class="state-sub">${e.message}</p>
        <button class="btn btn-more" onclick="loadData(true)" style="margin-top:.5rem">Повторить</button>
      </div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

/* ── BADGE ── */
function badge(p) {
  if(p.error)            return `<span class="avail-badge avail-unk"><span class="avail-dot"></span>Ошибка</span>`;
  if(p.available===null) return `<span class="avail-badge avail-unk"><span class="avail-dot"></span>Нет данных</span>`;
  if(p.available)        return `<span class="avail-badge avail-yes"><span class="avail-dot"></span>Билеты есть</span>`;
  return                        `<span class="avail-badge avail-no"><span class="avail-dot"></span>Распродано</span>`;
}

/* ── RENDER ── */
function renderGrid() {
  const grid=document.getElementById('grid');
  const prods=filtered();

  const cb=document.getElementById('countBar');
  cb.textContent=`${prods.length} постановок · фильтр: ${filter==='all'?'все':filter==='avail'?'есть билеты':'ближайшие 14 дней'}`;

  if(!prods.length) {
    grid.innerHTML=`<div class="state-box">
      <div class="state-cross"></div>
      <p class="state-title">Ничего не найдено</p>
      <p class="state-sub">Попробуй другой фильтр</p>
    </div>`;
    return;
  }
  grid.innerHTML=prods.map(renderCard).join('');
}

function renderCard(p) {
  const t=today0();
  const future=p.dates.filter(d=>pd(d.date)>=t);
  const show=future.slice(0,3);
  const rest=future.length-3;

  const poster=p.image
    ? `<img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=poster-ph>ТЕАТР</div>'">`
    : `<div class="poster-ph">ТЕАТР</div>`;

  const datesHtml=show.length
    ? `<p class="dates-lbl">Ближайшие даты</p>
       ${show.map(d=>{
         const dt=pd(d.date); const rel=relLabel(d.date); const sold=!d.available;
         return `<div class="date-row${sold?' date-sold':''}">
           <span class="date-num">${String(dt.getDate()).padStart(2,'0')}</span>
           <span class="date-info">${MONS[dt.getMonth()]}${rel?` <span class="date-rel">${rel}</span>`:''}</span>
           <span class="date-time">${d.time||''}</span>
         </div>`;
       }).join('')}
       ${rest>0?`<p class="more-dates">+ ${rest} ${pluralDates(rest)}</p>`:''}`
    : `<p class="dates-lbl" style="opacity:.35">Дат не найдено</p>`;

  const buyUrl=p.dates.find(d=>d.available&&d.buy_url)?.buy_url||p.url;
  const priceHtml=p.price_min
    ? `<div><div class="price">${fmtPrice(p.price_min,p.price_max)}</div><div class="price-lbl">от / до</div></div>`
    : `<div></div>`;

  return `
  <div class="card" onclick="openModal('${p.id}')">
    <div class="card-poster">${poster}</div>
    <div class="card-body">
      <div class="card-theater">${p.theater}</div>
      <div class="card-title">${p.name}</div>
      ${badge(p)}
      <div class="card-dates">${datesHtml}</div>
      <div class="card-footer">
        ${priceHtml}
        ${p.available&&buyUrl
          ? `<a href="${buyUrl}" target="_blank" class="btn btn-buy" onclick="event.stopPropagation()">Купить ↗</a>`
          : `<button class="btn btn-more" onclick="event.stopPropagation();openModal('${p.id}')">Детали</button>`}
      </div>
    </div>
  </div>`;
}

/* ── MODAL ── */
function openModal(id) {
  const p=all.find(x=>x.id===id); if(!p) return;

  document.getElementById('mTheater').textContent=p.theater;
  document.getElementById('mTitle').textContent=p.name;
  document.getElementById('mBadge').innerHTML=badge(p);
  document.getElementById('mLink').href=p.url;

  const descEl=document.getElementById('mDesc');
  if(p.description) {
    descEl.textContent=p.description;
    descEl.style.display='block';
  } else {
    descEl.style.display='none';
  }

  const t=today0();
  const future=p.dates.filter(d=>pd(d.date)>=t);
  const datesEl=document.getElementById('mDates');

  if(!future.length) {
    datesEl.innerHTML=p.error
      ? `<div class="no-dates">${p.error}</div>`
      : `<div class="no-dates">Нет предстоящих дат</div>`;
  } else {
    datesEl.innerHTML=future.map(d=>{
      const dt=pd(d.date); const sold=!d.available; const rel=relLabel(d.date);
      return `
      <div class="m-date${sold?' sold':''}">
        <div class="m-date-num">${String(dt.getDate()).padStart(2,'0')}</div>
        <div class="m-date-info">
          <div class="m-date-main">${fmtFull(d.date)}${rel?` <span style="font-family:'Barlow Condensed';font-weight:600;font-size:.65rem;letter-spacing:.12em;color:var(--fg)">${rel}</span>`:''}</div>
          <div class="m-date-sub">${wday(d.date)}${d.time?' · '+d.time:''}${sold?' · РАСПРОДАНО':''}</div>
        </div>
        <div class="m-date-price">
          ${d.price_min?fmtPrice(d.price_min,d.price_max):''}
          ${d.price_min?`<small>от / до</small>`:''}
        </div>
        ${d.available&&d.buy_url
          ? `<a href="${d.buy_url}" target="_blank" class="m-buy-btn" onclick="event.stopPropagation()">↗</a>`
          : `<div style="width:28px"></div>`}
      </div>`;
    }).join('');
  }

  document.getElementById('backdrop').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal() {
  document.getElementById('backdrop').classList.remove('open');
  document.body.style.overflow='';
}

function backdropClick(e) {
  if(e.target===document.getElementById('backdrop')) closeModal();
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

loadData();
</script>
</body>
</html>
