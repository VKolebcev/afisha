<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Театральная Афиша</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:   #090806;
      --deep:    #111009;
      --surface: #191710;
      --card:    #201d15;
      --card-h:  #27231a;
      --border:  #2c2820;
      --border-l:#3a3528;
      --gold:    #c6a55e;
      --gold-d:  #7d6535;
      --gold-l:  #e2c98a;
      --cream:   #ede5d3;
      --muted:   #6e6653;
      --dim:     #4a4435;
      --red-b:   #c42e42;
      --green-b: #2e8f59;
      --r: .75rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 17px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 200;
      background: rgba(9,8,6,.93);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.25rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      display: flex; align-items: center; gap: .55rem;
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: .05em; color: var(--gold);
      cursor: pointer; text-decoration: none;
      transition: color .2s;
      user-select: none;
    }
    .logo:hover { color: var(--gold-l); }
    .logo-ring {
      width: 24px; height: 24px; flex-shrink: 0;
      border: 1.5px solid var(--gold); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem;
    }

    .header-right { display: flex; align-items: center; gap: .75rem; }
    .last-updated {
      font-family: 'Montserrat', sans-serif;
      font-size: .58rem; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted);
    }
    .refresh-btn {
      background: none; border: 1px solid var(--border-l);
      color: var(--muted); border-radius: 50%;
      width: 30px; height: 30px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: all .2s;
    }
    .refresh-btn:hover { border-color: var(--gold-d); color: var(--gold); }
    .refresh-btn.spinning { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HERO ── */
    .hero {
      padding: 2.8rem 1.25rem 1.8rem;
      text-align: center;
    }
    .hero-tag {
      font-family: 'Montserrat', sans-serif;
      font-size: .58rem; letter-spacing: .26em;
      text-transform: uppercase; color: var(--gold-d);
      margin-bottom: .9rem;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 7vw, 3.6rem);
      font-weight: 900; line-height: 1.08;
      color: var(--cream); margin-bottom: .5rem;
    }
    .hero h1 em { color: var(--gold); font-style: italic; }
    .hero-sub {
      font-size: .95rem; color: var(--muted); font-weight: 300;
      max-width: 380px; margin: 0 auto 1.5rem;
    }
    .ornament { color: var(--gold-d); letter-spacing: .5rem; opacity: .45; font-size: 1rem; }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex; align-items: center; gap: .5rem;
      padding: 0 1.25rem 1.5rem;
      flex-wrap: wrap;
    }
    .filter-label {
      font-family: 'Montserrat', sans-serif;
      font-size: .58rem; letter-spacing: .14em;
      text-transform: uppercase; color: var(--muted);
    }
    .filter-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 100px;
      padding: .28rem .8rem;
      font-size: .7rem; font-family: 'Montserrat', sans-serif;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--gold-d); color: var(--gold);
      background: rgba(198,165,94,.07);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      padding: 0 1.25rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 640px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden; cursor: pointer;
      transition: transform .22s ease, border-color .22s, box-shadow .22s;
      display: flex; flex-direction: column;
      animation: fadeUp .38s ease both;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--border-l);
      box-shadow: 0 14px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(198,165,94,.1);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(1) { animation-delay: .04s; }
    .card:nth-child(2) { animation-delay: .08s; }
    .card:nth-child(3) { animation-delay: .12s; }
    .card:nth-child(4) { animation-delay: .16s; }
    .card:nth-child(5) { animation-delay: .20s; }
    .card:nth-child(6) { animation-delay: .24s; }

    /* On mobile: row layout (poster left, info right) */
    @media (max-width: 639px) {
      .card { flex-direction: row; min-height: 140px; }
    }

    .card-poster {
      background: var(--surface);
      overflow: hidden; position: relative; flex-shrink: 0;
    }
    /* Mobile: narrow left column */
    @media (max-width: 639px) {
      .card-poster { width: 100px; min-height: 100%; }
    }
    /* Desktop: top image */
    @media (min-width: 640px) {
      .card-poster { aspect-ratio: 2/3; max-height: 200px; width: 100%; }
    }

    .card-poster img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform .4s ease;
    }
    .card:hover .card-poster img { transform: scale(1.05); }

    .poster-ph {
      width: 100%; height: 100%; min-height: 100px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; opacity: .15; color: var(--gold);
    }

    .card-body {
      padding: .9rem 1rem;
      flex: 1; display: flex; flex-direction: column; gap: .45rem;
      min-width: 0;
    }

    .card-theater {
      font-family: 'Montserrat', sans-serif;
      font-size: .58rem; letter-spacing: .16em;
      text-transform: uppercase; color: var(--gold-d);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 700; line-height: 1.2;
      color: var(--cream);
    }

    .avail-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      font-family: 'Montserrat', sans-serif;
      font-size: .58rem; font-weight: 500; letter-spacing: .09em;
      text-transform: uppercase; padding: .2rem .6rem;
      border-radius: 100px; width: fit-content;
    }
    .avail-yes { background: rgba(46,143,89,.15); color: var(--green-b); border: 1px solid rgba(46,143,89,.28); }
    .avail-no  { background: rgba(196,46,66,.12); color: var(--red-b);   border: 1px solid rgba(196,46,66,.22); }
    .avail-unk { background: rgba(110,102,83,.1);  color: var(--muted);  border: 1px solid var(--border); }
    .avail-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    .card-dates { flex: 1; display: flex; flex-direction: column; gap: .2rem; }
    .dates-lbl {
      font-family: 'Montserrat', sans-serif;
      font-size: .56rem; letter-spacing: .12em;
      text-transform: uppercase; color: var(--dim);
      margin-bottom: .08rem;
    }
    .date-row {
      display: flex; align-items: baseline; gap: .4rem;
      font-size: .85rem;
    }
    .date-num {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700; color: var(--cream);
      min-width: 1.4rem;
    }
    .date-info { color: var(--muted); font-size: .8rem; font-weight: 300; }
    .date-rel  { color: var(--gold-d); font-style: normal; }
    .date-time { color: var(--dim); font-size: .72rem; margin-left: auto; font-family: 'Montserrat', sans-serif; flex-shrink: 0; }
    .date-sold { opacity: .38; text-decoration: line-through; }
    .more-dates { font-size: .75rem; color: var(--dim); font-style: italic; margin-top: .05rem; }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between; gap: .4rem;
      margin-top: .25rem; padding-top: .65rem;
      border-top: 1px solid var(--border);
    }
    .price {
      font-family: 'Playfair Display', serif;
      font-size: .95rem; font-weight: 700; color: var(--gold);
    }
    .price-lbl { font-family: 'Montserrat', sans-serif; font-size: .54rem; color: var(--dim); }

    .btn {
      display: inline-flex; align-items: center; gap: .35rem;
      font-family: 'Montserrat', sans-serif;
      font-size: .62rem; font-weight: 600; letter-spacing: .09em;
      text-transform: uppercase; text-decoration: none;
      padding: .42rem .85rem; border-radius: 100px;
      border: none; cursor: pointer; white-space: nowrap;
      transition: all .2s;
    }
    .btn-gold { background: var(--gold); color: var(--black); }
    .btn-gold:hover { background: var(--gold-l); transform: translateY(-1px); }
    .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--gold-d); color: var(--gold); }

    /* ── MODAL ── */
    .backdrop {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(9,8,6,.88);
      backdrop-filter: blur(8px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .backdrop.open { opacity: 1; pointer-events: all; }
    @media (min-width: 600px) { .backdrop { align-items: center; } }

    .modal {
      background: var(--card);
      border: 1px solid var(--border-l);
      border-radius: var(--r) var(--r) 0 0;
      width: 100%; max-width: 560px; max-height: 90vh;
      overflow-y: auto;
      transform: translateY(36px);
      transition: transform .3s cubic-bezier(.22,.8,.36,1);
      padding: 1.25rem;
      position: relative;
    }
    @media (min-width: 600px) {
      .modal { border-radius: var(--r); max-height: 85vh; }
    }
    .backdrop.open .modal { transform: translateY(0); }

    .drag-handle {
      width: 34px; height: 4px; background: var(--border-l);
      border-radius: 2px; margin: 0 auto .9rem;
    }
    @media (min-width: 600px) { .drag-handle { display: none; } }

    .modal-close {
      position: absolute; top: .9rem; right: .9rem;
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 50%;
      width: 30px; height: 30px; font-size: .9rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .modal-close:hover { border-color: var(--gold-d); color: var(--gold); }

    .m-tag  { font-family: 'Montserrat', sans-serif; font-size: .58rem; letter-spacing: .18em; text-transform: uppercase; color: var(--gold-d); margin-bottom: .4rem; }
    .m-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; line-height: 1.1; color: var(--cream); margin-bottom: .7rem; }
    .m-desc  { font-size: .9rem; color: var(--muted); font-weight: 300; line-height: 1.7; margin-bottom: 1rem; font-style: italic; }
    .m-sec-lbl { font-family: 'Montserrat', sans-serif; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-bottom: .6rem; margin-top: .9rem; }

    .m-dates { display: flex; flex-direction: column; gap: .45rem; }

    .m-date {
      display: flex; align-items: center; gap: .7rem;
      padding: .6rem .75rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: calc(var(--r) - 2px);
      transition: border-color .2s;
    }
    .m-date:hover { border-color: var(--border-l); }
    .m-date.sold { opacity: .35; }

    .m-date-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 700; color: var(--cream);
      min-width: 1.7rem; text-align: center;
    }
    .m-date-info { flex: 1; min-width: 0; }
    .m-date-main { font-size: .88rem; color: var(--cream); }
    .m-date-sub  { font-size: .76rem; color: var(--muted); font-weight: 300; }
    .m-date-price {
      font-family: 'Playfair Display', serif;
      font-size: .95rem; font-weight: 700; color: var(--gold);
      text-align: right; flex-shrink: 0;
    }
    .m-date-price small { display: block; font-family: 'Montserrat', sans-serif; font-size: .52rem; color: var(--dim); font-weight: 400; }
    .m-buy-btn {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: var(--gold); color: var(--black);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: .78rem;
      transition: all .2s;
    }
    .m-buy-btn:hover { background: var(--gold-l); transform: scale(1.1); }

    .no-dates { text-align: center; padding: 1.5rem; color: var(--dim); font-style: italic; font-size: .9rem; }

    /* ── STATES ── */
    .state-box {
      grid-column: 1 / -1;
      display: flex; flex-direction: column; align-items: center;
      padding: 5rem 1rem; gap: 1rem; text-align: center;
    }
    .state-icon { font-size: 2.2rem; opacity: .25; }
    .state-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--muted); }
    .state-sub   { font-size: .85rem; color: var(--dim); max-width: 320px; }
    .spinner {
      width: 34px; height: 34px;
      border: 2px solid var(--border); border-top-color: var(--gold);
      border-radius: 50%; animation: spin .8s linear infinite;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-l); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="closeModal()">
    <div class="logo-ring">✦</div>
    Афиша
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="refresh-btn" id="refreshBtn" title="Обновить" onclick="loadData(true)">↻</button>
  </div>
</header>

<section class="hero">
  <p class="hero-tag">Мониторинг билетов</p>
  <h1>Театральная <em>Афиша</em></h1>
  <p class="hero-sub">Ближайшие даты и наличие билетов на ваши постановки</p>
  <div class="ornament">✦ ✦ ✦</div>
</section>

<div class="filter-bar" id="filterBar" style="display:none">
  <span class="filter-label">Показать:</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">Все</button>
  <button class="filter-btn"        onclick="setFilter('avail',this)">Есть билеты</button>
  <button class="filter-btn"        onclick="setFilter('soon',this)">Ближайшие 14 дней</button>
</div>

<div class="grid" id="grid">
  <div class="state-box">
    <div class="spinner"></div>
    <p class="state-title">Загрузка афиши…</p>
  </div>
</div>

<!-- MODAL -->
<div class="backdrop" id="backdrop" onclick="backdropClick(event)">
  <div class="modal">
    <div class="drag-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <p class="m-tag"  id="mTag"></p>
    <h2 class="m-title" id="mTitle"></h2>
    <p class="m-desc"   id="mDesc"></p>
    <div id="mBadge" style="margin-bottom:.7rem"></div>
    <p class="m-sec-lbl">Расписание</p>
    <div class="m-dates" id="mDates"></div>
    <div style="margin-top:.9rem; display:flex; justify-content:flex-end">
      <a id="mLink" href="#" target="_blank" class="btn btn-ghost">Страница спектакля ↗</a>
    </div>
  </div>
</div>

<script>
const DATA_URL = 'data/productions.json';
let all = [];
let filter = 'all';

const MONS  = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
const MONS_F= ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const WDS   = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

function pd(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function today0() { const t=new Date(); t.setHours(0,0,0,0); return t; }

function fmtShort(s) { const d=pd(s); return `${d.getDate()} ${MONS[d.getMonth()]}`; }
function fmtFull(s)  { const d=pd(s); return `${d.getDate()} ${MONS_F[d.getMonth()]} ${d.getFullYear()}`; }
function wday(s)     { return WDS[pd(s).getDay()]; }

function fmtPrice(mn,mx) {
  if (!mn&&!mx) return '';
  const f = n => n.toLocaleString('ru');
  return (mn===mx||!mx) ? `${f(mn)} ₽` : `${f(mn)} – ${f(mx)} ₽`;
}

function daysDiff(s) {
  return Math.round((pd(s)-today0())/86400000);
}

function relLabel(s) {
  const d=daysDiff(s);
  if(d===0) return 'сегодня';
  if(d===1) return 'завтра';
  if(d<=7)  return `через ${d} дн.`;
  return null;
}

function pluralDates(n) {
  if(n%10===1&&n%100!==11) return 'дата';
  if([2,3,4].includes(n%10)&&![12,13,14].includes(n%100)) return 'даты';
  return 'дат';
}

/* ── FILTER ── */
function setFilter(f,btn) {
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function filtered() {
  const t=today0();
  const t14=new Date(t); t14.setDate(t.getDate()+14);
  return all.filter(p=>{
    if(filter==='avail') return p.available;
    if(filter==='soon')  return p.dates.some(d=>{ const dt=pd(d.date); return dt>=t&&dt<=t14; });
    return true;
  });
}

/* ── LOAD ── */
async function loadData(force=false) {
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    const r=await fetch(force?`${DATA_URL}?t=${Date.now()}`:DATA_URL);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    all=data.productions||[];
    if(data.last_updated) {
      const dt=new Date(data.last_updated);
      document.getElementById('lastUpdated').textContent=
        `обновлено ${dt.toLocaleDateString('ru',{day:'2-digit',month:'short'})} ${dt.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}`;
    }
    document.getElementById('filterBar').style.display='flex';
    renderGrid();
  } catch(e) {
    document.getElementById('grid').innerHTML=`
      <div class="state-box">
        <div class="state-icon">⚠</div>
        <p class="state-title">Не удалось загрузить данные</p>
        <p class="state-sub">${e.message}</p>
        <button class="btn btn-ghost" onclick="loadData(true)">Повторить</button>
      </div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

/* ── RENDER ── */
function badge(p) {
  if(p.error)          return `<span class="avail-badge avail-unk"><span class="avail-dot"></span>Ошибка</span>`;
  if(p.available===null) return `<span class="avail-badge avail-unk"><span class="avail-dot"></span>Нет данных</span>`;
  if(p.available)      return `<span class="avail-badge avail-yes"><span class="avail-dot"></span>Билеты есть</span>`;
  return                      `<span class="avail-badge avail-no"><span class="avail-dot"></span>Распродано</span>`;
}

function renderGrid() {
  const grid=document.getElementById('grid');
  const prods=filtered();
  if(!prods.length) {
    grid.innerHTML=`<div class="state-box"><div class="state-icon">🎭</div><p class="state-title">Ничего не найдено</p><p class="state-sub">Попробуй другой фильтр</p></div>`;
    return;
  }
  grid.innerHTML=prods.map(renderCard).join('');
}

function renderCard(p) {
  const t=today0();
  const future=p.dates.filter(d=>pd(d.date)>=t);
  const show=future.slice(0,3);
  const rest=future.length-3;

  const poster=p.image
    ? `<img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=poster-ph>🎭</div>'">`
    : `<div class="poster-ph">🎭</div>`;

  const datesHtml=show.length
    ? `<p class="dates-lbl">Ближайшие даты</p>
       ${show.map(d=>{
         const dt=pd(d.date); const rel=relLabel(d.date); const sold=!d.available;
         return `<div class="date-row${sold?' date-sold':''}">
           <span class="date-num">${dt.getDate()}</span>
           <span class="date-info">${MONS[dt.getMonth()]}${rel?` · <span class="date-rel">${rel}</span>`:''}</span>
           <span class="date-time">${d.time||''}</span>
         </div>`;
       }).join('')}
       ${rest>0?`<p class="more-dates">и ещё ${rest} ${pluralDates(rest)}…</p>`:''}`
    : `<p class="dates-lbl" style="color:var(--dim);font-style:italic">Дат не найдено</p>`;

  const buyUrl=p.dates.find(d=>d.available&&d.buy_url)?.buy_url||p.url;
  const priceHtml=p.price_min
    ? `<div><div class="price">${fmtPrice(p.price_min,p.price_max)}</div><div class="price-lbl">от&nbsp;/ до</div></div>`
    : `<div></div>`;

  return `
  <div class="card" onclick="openModal('${p.id}')">
    <div class="card-poster">${poster}</div>
    <div class="card-body">
      <div class="card-theater">${p.theater}</div>
      <div class="card-title">${p.name}</div>
      ${badge(p)}
      <div class="card-dates">${datesHtml}</div>
      <div class="card-footer">
        ${priceHtml}
        ${p.available&&buyUrl
          ? `<a href="${buyUrl}" target="_blank" class="btn btn-gold" onclick="event.stopPropagation()">Купить ↗</a>`
          : `<button class="btn btn-ghost" onclick="event.stopPropagation();openModal('${p.id}')">Подробнее</button>`}
      </div>
    </div>
  </div>`;
}

/* ── MODAL ── */
function openModal(id) {
  const p=all.find(x=>x.id===id); if(!p) return;

  document.getElementById('mTag').textContent=p.theater;
  document.getElementById('mTitle').textContent=p.name;
  const descEl=document.getElementById('mDesc');
  descEl.textContent=p.description||'';
  descEl.style.display=p.description?'':'none';
  document.getElementById('mBadge').innerHTML=badge(p);
  document.getElementById('mLink').href=p.url;

  const t=today0();
  const future=p.dates.filter(d=>pd(d.date)>=t);
  const datesEl=document.getElementById('mDates');

  if(!future.length) {
    datesEl.innerHTML=p.error
      ? `<div class="no-dates">⚠ ${p.error}</div>`
      : `<div class="no-dates">Нет предстоящих дат</div>`;
  } else {
    datesEl.innerHTML=future.map(d=>{
      const dt=pd(d.date); const sold=!d.available; const rel=relLabel(d.date);
      return `
      <div class="m-date${sold?' sold':''}">
        <div class="m-date-num">${dt.getDate()}</div>
        <div class="m-date-info">
          <div class="m-date-main">${fmtFull(d.date)}${rel?` <em style="color:var(--gold-d);font-size:.78em;font-style:normal">(${rel})</em>`:''}</div>
          <div class="m-date-sub">${wday(d.date)}${d.time?' · '+d.time:''}${sold?' · Распродано':''}</div>
        </div>
        <div class="m-date-price">
          ${d.price_min?fmtPrice(d.price_min,d.price_max):''}
          <small>${d.price_min?'от / до':''}</small>
        </div>
        ${d.available&&d.buy_url
          ? `<a href="${d.buy_url}" target="_blank" class="m-buy-btn" title="Купить билет" onclick="event.stopPropagation()">↗</a>`
          : `<div style="width:30px"></div>`}
      </div>`;
    }).join('');
  }

  document.getElementById('backdrop').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal() {
  document.getElementById('backdrop').classList.remove('open');
  document.body.style.overflow='';
}

function backdropClick(e) {
  if(e.target===document.getElementById('backdrop')) closeModal();
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

loadData();
</script>
</body>
