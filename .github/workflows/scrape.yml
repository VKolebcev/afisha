name: Scrape Theater Data

on:
  schedule:
    # Каждые 3 часа (UTC). Настрой под себя: https://crontab.guru
    - cron: "0 */3 * * *"
  workflow_dispatch:   # Запуск вручную из GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python deps
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/productions.json
          git diff --cached --quiet || git commit -m "chore: update theater data [skip ci]"
          git push
