name: Scrape Theater Data

on:
  schedule:
    # Каждые 3 часа (UTC). Настрой под себя: https://crontab.guru
    - cron: "0 */3 * * *"
  workflow_dispatch:   # Позволяет запустить вручную из GitHub UI

permissions:
  contents: write      # Нужно для коммита data/productions.json

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/productions.json
          # Коммитим только если есть изменения
          git diff --cached --quiet || git commit -m "chore: update theater data [skip ci]"
          git push